spring:
  application:
    name: url-shortner

app:
  base-url: http://localhost:8080

  data:
    mongodb:
      uri: mongodb://localhost:27017/url-shortner-db
      auto-index-creation: true

  redis:
    host: localhost
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 5
        min-idle: 1

logging:
  level:
    org.springframework.data.mongodb: DEBUG
    org.springframework.data.redis: DEBUG

server:
  port: 8080